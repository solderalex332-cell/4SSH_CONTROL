llm:
  provider: "ollama"
  model: "qwen2.5:7b"
  api_key: ""
  base_url: "http://localhost:11434/v1"
  temperature: 0.1
  timeout: 120

agents:
  command_classifier:
    enabled: true
    weight: 1.0                 # вес голоса при консенсусе
  context_analyzer:
    enabled: true
    weight: 1.5                 # больший вес — учитывает контекст
    max_history: 50             # максимум команд в истории сессии
  policy_enforcer:
    enabled: true
    weight: 1.2

consensus:
  strategy: "weighted_majority" # weighted_majority | unanimous | any_deny
  deny_threshold: 0.5          # при weighted_majority — доля для deny
  escalate_on_disagreement: true

rules:
  whitelist:
    - "ls"
    - "pwd"
    - "whoami"
    - "date"
    - "uptime"
    - "hostname"
    - "id"
    - "cat /etc/hostname"
    - "uname -a"
    - "df -h"
    - "free -h"
    - "top -bn1"
    - "ps aux"
    - "ip a"
    - "ip addr"
    - "ifconfig"
    - "netstat -tlnp"
    - "ss -tlnp"

  sensitive_paths:
    - pattern: "/etc/shadow"
      severity: "critical"
      action: "deny"
      reason: "Файл хешей паролей"
    - pattern: "/etc/passwd"
      severity: "high"
      action: "escalate"
      reason: "Системный файл учётных записей"
    - pattern: "/etc/sudoers"
      severity: "critical"
      action: "deny"
      reason: "Конфигурация sudo-привилегий"
    - pattern: "/etc/ssh/sshd_config"
      severity: "high"
      action: "escalate"
      reason: "Конфигурация SSH-сервера"
    - pattern: "/etc/ssh/authorized_keys"
      severity: "critical"
      action: "deny"
      reason: "SSH авторизованные ключи"
    - pattern: ".ssh/authorized_keys"
      severity: "critical"
      action: "deny"
      reason: "SSH авторизованные ключи"
    - pattern: "/etc/crontab"
      severity: "high"
      action: "escalate"
      reason: "Системный crontab"
    - pattern: "/var/spool/cron"
      severity: "high"
      action: "escalate"
      reason: "Пользовательские cron-задачи"
    - pattern: "/etc/iptables"
      severity: "critical"
      action: "deny"
      reason: "Правила файрвола"
    - pattern: "/etc/hosts.allow"
      severity: "high"
      action: "escalate"
      reason: "TCP wrappers allow"
    - pattern: "/etc/hosts.deny"
      severity: "high"
      action: "escalate"
      reason: "TCP wrappers deny"
    - pattern: "/etc/pam.d/"
      severity: "critical"
      action: "deny"
      reason: "Модули аутентификации PAM"
    - pattern: "/root/.bashrc"
      severity: "high"
      action: "escalate"
      reason: "Автозагрузка root"
    - pattern: "/root/.profile"
      severity: "high"
      action: "escalate"
      reason: "Профиль root"
    - pattern: "/etc/ld.so.preload"
      severity: "critical"
      action: "deny"
      reason: "Preload разделяемых библиотек (руткит-вектор)"
    - pattern: "/etc/environment"
      severity: "high"
      action: "escalate"
      reason: "Глобальные переменные окружения"

  dangerous_content:
    - pattern: "bash -i >& /dev/tcp/"
      reason: "Reverse shell"
      severity: "critical"
    - pattern: "/bin/sh -i"
      reason: "Интерактивный shell (бэкдор)"
      severity: "critical"
    - pattern: "nc -e /bin/"
      reason: "Netcat reverse shell"
      severity: "critical"
    - pattern: "mkfifo /tmp/"
      reason: "Named pipe (бэкдор-техника)"
      severity: "high"
    - pattern: "ssh-rsa "
      reason: "Вставка SSH-ключа"
      severity: "high"
    - pattern: "ssh-ed25519 "
      reason: "Вставка SSH-ключа"
      severity: "high"
    - pattern: "ALL=(ALL)"
      reason: "Sudoers-правило полного доступа"
      severity: "critical"
    - pattern: "NOPASSWD"
      reason: "Sudo без пароля"
      severity: "critical"
    - pattern: "PermitRootLogin yes"
      reason: "Разрешение root SSH-входа"
      severity: "critical"
    - pattern: "PasswordAuthentication yes"
      reason: "Включение парольной SSH-аутентификации"
      severity: "high"
    - pattern: "0 * * * * "
      reason: "Cron-задача (каждый час)"
      severity: "medium"
    - pattern: "* * * * * "
      reason: "Cron-задача (каждую минуту — подозрительно)"
      severity: "high"
    - pattern: "LD_PRELOAD"
      reason: "Подмена разделяемых библиотек"
      severity: "critical"
    - pattern: "socat"
      reason: "Socat-тоннель (потенциальный бэкдор)"
      severity: "high"

  # Контекстные правила эскалации: не запрещают команду целиком,
  # а ловят опасный СПОСОБ использования и форсируют эскалацию (Admin-2 решает).
  # action: escalate — мимо LLM, сразу на Admin-2
  # action: deny     — жёсткий блок
  escalation_rules:
    # --- kill: убивать процесс можно, но не PID 1 и не критичные сервисы ---
    - pattern: "kill\\s+.*\\b(1|--pid\\s+1)\\b"
      reason: "kill PID 1 (init/systemd) → крэш системы"
      severity: "critical"
      action: "deny"
    - pattern: "(kill|killall|pkill)\\s+.*\\b(sshd|systemd|init|dbus|udevd|journald)\\b"
      reason: "Уничтожение критичного системного процесса"
      severity: "critical"
      action: "deny"
    - pattern: "kill\\s+-9\\s+(-1|0)\\b"
      reason: "kill -9 -1/0 убивает все процессы пользователя/группы"
      severity: "critical"
      action: "deny"
    - pattern: "killall\\s+(?!-l\\b)"
      reason: "Массовое завершение процессов по имени"
      severity: "medium"
      action: "escalate"

    # --- mv: перемещать можно, но не /bin /sbin /usr/bin /lib ---
    - pattern: "mv\\s+.*/s?bin/.*\\s"
      reason: "Перемещение/переименование системного бинарника"
      severity: "critical"
      action: "deny"
    - pattern: "mv\\s+.*/lib/.*\\s"
      reason: "Перемещение системной библиотеки"
      severity: "critical"
      action: "deny"
    - pattern: "mv\\s+.*\\s+/etc/"
      reason: "Перезапись конфигурации через mv"
      severity: "high"
      action: "escalate"

    # --- tee/redirect: писать в /tmp можно, но не в /etc или системные логи ---
    - pattern: "tee\\s+(-a\\s+)?/etc/"
      reason: "Запись в /etc/ через tee"
      severity: "high"
      action: "escalate"
    - pattern: "tee\\s+(-a\\s+)?/var/spool/"
      reason: "Запись в /var/spool/ через tee (cron/mail)"
      severity: "high"
      action: "escalate"
    - pattern: ">\\s*/etc/"
      reason: "Перенаправление вывода в /etc/"
      severity: "high"
      action: "escalate"
    - pattern: ">\\s*/var/log/"
      reason: "Перезапись/очистка системного лога через redirect"
      severity: "high"
      action: "escalate"
    - pattern: "(?:^|[/\\s])rm\\s+.*(/var/log/|/var/run/)"
      reason: "Удаление лог-файлов / PID-файлов"
      severity: "high"
      action: "escalate"

    # --- truncate: обнуление файлов ---
    - pattern: "truncate\\s+"
      reason: "Обнуление файла через truncate"
      severity: "high"
      action: "escalate"
    - pattern: "cat\\s+/dev/null\\s*>\\s*/"
      reason: "Обнуление файла через cat /dev/null > path"
      severity: "high"
      action: "escalate"

    # --- systemctl/service: restart/stop/disable произвольных сервисов ---
    - pattern: "systemctl\\s+(stop|disable|mask)\\s+"
      reason: "Остановка/отключение сервиса через systemctl"
      severity: "high"
      action: "escalate"
    - pattern: "service\\s+\\S+\\s+stop"
      reason: "Остановка сервиса через service"
      severity: "high"
      action: "escalate"

    # --- ssh: туннели ---
    - pattern: "ssh\\s+.*-[LRD]\\s+"
      reason: "SSH-туннель (port forward / reverse / dynamic SOCKS)"
      severity: "high"
      action: "escalate"

    # --- kubectl: деструктивные операции ---
    - pattern: "kubectl\\s+delete\\s+"
      reason: "Удаление ресурсов Kubernetes"
      severity: "high"
      action: "escalate"
    - pattern: "kubectl\\s+drain\\s+"
      reason: "Drain ноды Kubernetes"
      severity: "high"
      action: "escalate"
    - pattern: "kubectl\\s+cordon\\s+"
      reason: "Cordon ноды Kubernetes"
      severity: "medium"
      action: "escalate"

    # --- fallocate/dd для заполнения диска ---
    - pattern: "fallocate\\s+.*-l\\s+"
      reason: "Аллокация файла (потенциальное заполнение диска)"
      severity: "high"
      action: "escalate"

    # --- ln -s на системные файлы ---
    - pattern: "ln\\s+.*(-s|--symbolic)\\s+.*/etc/"
      reason: "Символическая ссылка на системный файл"
      severity: "medium"
      action: "escalate"

    # --- chown на системные файлы ---
    - pattern: "chown\\s+.*\\s+/etc/"
      reason: "Смена владельца системного файла"
      severity: "high"
      action: "escalate"
    - pattern: "chattr\\s+"
      reason: "Изменение атрибутов файла (immutable и т.п.)"
      severity: "high"
      action: "escalate"

    # --- SUID / permission escalation ---
    - pattern: "chmod\\s+.*[ugo]\\+s"
      reason: "Установка SUID/SGID бита (потенциальный бэкдор)"
      severity: "critical"
      action: "deny"
    - pattern: "chmod\\s+[247][0-7]{3}"
      reason: "Установка SUID/SGID через числовой режим"
      severity: "critical"
      action: "deny"
    - pattern: "install\\s+.*-m\\s*[247][0-7]{3}"
      reason: "install с SUID-битом (скрытый бэкдор)"
      severity: "critical"
      action: "deny"

    # --- Kernel modules ---
    - pattern: "\\b(insmod|modprobe)\\s+"
      reason: "Загрузка модуля ядра"
      severity: "critical"
      action: "escalate"
    - pattern: "\\brmmod\\s+"
      reason: "Выгрузка модуля ядра"
      severity: "high"
      action: "escalate"
    - pattern: "\\bsysctl\\s+-w\\s+"
      reason: "Изменение параметра ядра через sysctl"
      severity: "high"
      action: "escalate"

    # --- /proc/sys writes ---
    - pattern: ">\\s*/proc/"
      reason: "Запись в /proc (управление ядром)"
      severity: "critical"
      action: "escalate"

    # --- Package managers: удаление критичных пакетов ---
    - pattern: "(dpkg\\s+--purge|dpkg\\s+-r|apt-get\\s+remove|apt\\s+remove|yum\\s+remove|yum\\s+erase|dnf\\s+remove|pacman\\s+-R)"
      reason: "Удаление системного пакета через пакетный менеджер"
      severity: "high"
      action: "escalate"

    # --- mount / umount / namespace ---
    - pattern: "\\bmount\\s+"
      reason: "Монтирование файловой системы"
      severity: "high"
      action: "escalate"
    - pattern: "\\bumount\\s+"
      reason: "Размонтирование файловой системы"
      severity: "high"
      action: "escalate"
    - pattern: "\\bunshare\\s+"
      reason: "Создание namespace (потенциальный escape)"
      severity: "high"
      action: "escalate"

    # --- Network disruption ---
    - pattern: "ip\\s+link\\s+set\\s+\\S+\\s+down"
      reason: "Отключение сетевого интерфейса"
      severity: "critical"
      action: "escalate"
    - pattern: "ip\\s+route\\s+(replace|del|flush)"
      reason: "Изменение/удаление маршрутов (hijack)"
      severity: "critical"
      action: "escalate"
    - pattern: "ip\\s+(addr|neigh|link|rule)\\s+flush"
      reason: "ip flush — массовое удаление сетевой конфигурации"
      severity: "critical"
      action: "escalate"
    - pattern: "ifconfig\\s+\\S+\\s+down"
      reason: "Отключение сетевого интерфейса через ifconfig"
      severity: "critical"
      action: "escalate"
    - pattern: "iptables\\s+-[AI]\\s+.*-j\\s+(DROP|REJECT)"
      reason: "iptables добавление правила DROP/REJECT"
      severity: "high"
      action: "escalate"
    - pattern: "\\bnft\\s+(flush|delete)"
      reason: "nftables сброс/удаление правил"
      severity: "critical"
      action: "escalate"
    - pattern: "\\btc\\s+qdisc"
      reason: "Управление трафик-контролем (потенциальный DoS)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bbrctl\\s+(delbr|delif)"
      reason: "Удаление сетевого моста/интерфейса"
      severity: "high"
      action: "escalate"

    # --- User management ---
    - pattern: "\\buseradd\\s+"
      reason: "Создание пользователя"
      severity: "high"
      action: "escalate"
    - pattern: "\\busermod\\s+.*-[aG]"
      reason: "Изменение группы пользователя"
      severity: "high"
      action: "escalate"
    - pattern: "\\bpasswd\\s+-d"
      reason: "Удаление пароля пользователя"
      severity: "critical"
      action: "deny"
    - pattern: "\\bchpasswd"
      reason: "Массовая смена паролей"
      severity: "high"
      action: "escalate"

    # --- Environment poisoning ---
    - pattern: "export\\s+PATH="
      reason: "Перезапись PATH (потенциальный hijack)"
      severity: "high"
      action: "escalate"
    - pattern: "export\\s+(BASH_ENV|ENV)="
      reason: "Установка BASH_ENV/ENV (auto-execute injection)"
      severity: "critical"
      action: "deny"
    - pattern: "export\\s+PROMPT_COMMAND="
      reason: "Установка PROMPT_COMMAND (скрытое исполнение)"
      severity: "critical"
      action: "deny"
    - pattern: "export\\s+LD_PRELOAD="
      reason: "LD_PRELOAD injection"
      severity: "critical"
      action: "deny"
    - pattern: "\\balias\\s+sudo="
      reason: "Подмена alias для sudo"
      severity: "critical"
      action: "deny"
    - pattern: "\\balias\\s+(rm|ls|cat|ps|ss|netstat)="
      reason: "Подмена alias для базовой утилиты"
      severity: "high"
      action: "escalate"

    # --- Indirect file operations ---
    - pattern: "cp\\s+/dev/null\\s+"
      reason: "Обнуление файла через cp /dev/null"
      severity: "high"
      action: "escalate"
    - pattern: "ln\\s+.*-[sf]+.*\\s+/var/log/"
      reason: "Подмена лог-файла через символическую ссылку"
      severity: "high"
      action: "escalate"
    - pattern: "tar\\s+.*-C\\s+/"
      reason: "Распаковка tar в корень файловой системы"
      severity: "critical"
      action: "escalate"
    - pattern: "tar\\s+xf?\\s+.*\\s+--directory=/"
      reason: "Распаковка tar в корень через --directory"
      severity: "critical"
      action: "escalate"
    - pattern: "\\bcpio\\s+-i"
      reason: "Распаковка cpio-архива (потенциальный rootkit deploy)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bpatch\\s+/etc/"
      reason: "Модификация системных файлов через patch"
      severity: "high"
      action: "escalate"
    - pattern: "\\bed\\s+/etc/"
      reason: "Редактирование системных файлов через ed"
      severity: "high"
      action: "escalate"

    # --- Download to executable paths ---
    - pattern: "wget\\s+.*-O\\s+"
      reason: "wget с записью в файл (потенциальная загрузка бэкдора)"
      severity: "high"
      action: "escalate"
    - pattern: "curl\\s+.*-o\\s+"
      reason: "curl с записью в файл (потенциальная загрузка бэкдора)"
      severity: "high"
      action: "escalate"
    - pattern: "curl\\s+.*-F\\s+"
      reason: "curl с отправкой файла (потенциальная exfiltration)"
      severity: "high"
      action: "escalate"
    - pattern: "curl\\s+.*--upload-file\\s+"
      reason: "curl --upload-file (потенциальная exfiltration)"
      severity: "high"
      action: "escalate"
    - pattern: "curl\\s+.*-T\\s+"
      reason: "curl -T (PUT upload, потенциальная exfiltration)"
      severity: "high"
      action: "escalate"
    - pattern: "scp\\s+.*\\s+/(usr|opt|bin|sbin)/"
      reason: "scp в системный каталог"
      severity: "high"
      action: "escalate"
    - pattern: "git\\s+clone\\s+.*\\s+/(opt|usr|srv)/"
      reason: "git clone в системный каталог"
      severity: "high"
      action: "escalate"
    - pattern: "\\brsync\\s+.*/etc/.*\\s+\\S+@\\S+:"
      reason: "rsync /etc/ на удалённый хост (exfiltration)"
      severity: "high"
      action: "escalate"
    - pattern: "\\brsync\\s+.*/(root|var|opt|usr|srv)/.*\\s+\\S+@\\S+:"
      reason: "rsync системного каталога на удалённый хост"
      severity: "high"
      action: "escalate"

    # --- Docker privileged / nsenter ---
    - pattern: "docker\\s+run\\s+.*--privileged"
      reason: "Docker run с --privileged (полный доступ к хосту)"
      severity: "critical"
      action: "escalate"
    - pattern: "\\bnsenter\\s+"
      reason: "nsenter — вход в namespace (container escape)"
      severity: "critical"
      action: "escalate"

    # --- Network recon & pivoting tools ---
    - pattern: "\\bsocat\\s+TCP"
      reason: "socat TCP-подключение (потенциальный relay/backdoor)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bnmap\\s+"
      reason: "Сканирование сети (nmap)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bmasscan\\s+"
      reason: "Массовое сканирование сети (masscan)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bsystemd-run\\s+"
      reason: "systemd-run — запуск как transient service"
      severity: "high"
      action: "escalate"
    - pattern: "\\bscreen\\s+-[dDm]"
      reason: "screen detached session (скрытое исполнение команд)"
      severity: "high"
      action: "escalate"
    - pattern: "\\btmux\\s+(new-session|new)\\s+-d"
      reason: "tmux detached session (скрытое исполнение команд)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bbatch\\b"
      reason: "batch — отложенное исполнение при снижении нагрузки"
      severity: "high"
      action: "escalate"
    - pattern: "\\bsetsid\\s+"
      reason: "setsid — запуск в новой сессии (detach от терминала)"
      severity: "high"
      action: "escalate"

    # --- Debugging / traffic capture (potential reconnaissance) ---
    - pattern: "\\bstrace\\s+"
      reason: "Трассировка системных вызовов (разведка / перехват данных)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bltrace\\s+"
      reason: "Трассировка библиотечных вызовов"
      severity: "high"
      action: "escalate"
    - pattern: "\\btcpdump\\s+"
      reason: "Перехват сетевого трафика"
      severity: "high"
      action: "escalate"
    - pattern: "\\btshark\\s+"
      reason: "Перехват сетевого трафика (Wireshark CLI)"
      severity: "high"
      action: "escalate"

    # --- sed -i in system directories ---
    - pattern: "sed\\s+(-[a-zA-Z]*i|-i[a-zA-Z]*)\\s+.*\\s+/etc/"
      reason: "Модификация системного файла через sed -i"
      severity: "high"
      action: "escalate"
    - pattern: "sed\\s+(-[a-zA-Z]*i|-i[a-zA-Z]*)\\s+.*\\s+/(usr|var|boot|lib)/"
      reason: "Модификация системного файла через sed -i"
      severity: "high"
      action: "escalate"

    # --- Compilation / linking (potential exploit) ---
    - pattern: "\\b(gcc|g\\+\\+|cc|clang|clang\\+\\+|make|cmake)\\s+"
      reason: "Компиляция кода (потенциальный exploit)"
      severity: "high"
      action: "escalate"

    # --- Hex/encoding decode → exec ---
    - pattern: "xxd\\s+.*\\|\\s*(bash|sh)"
      reason: "Hex decode → exec через xxd"
      severity: "critical"
      action: "deny"
    - pattern: "printf\\s+.*\\|\\s*(bash|sh)"
      reason: "Printf в pipe → exec (обфускация)"
      severity: "critical"
      action: "deny"

    # --- Exfiltration: pipe to nc/netcat/curl ---
    - pattern: "\\|\\s*n(c|etcat)\\s+"
      reason: "Pipe данных в netcat (exfiltration / reverse shell)"
      severity: "critical"
      action: "escalate"
    - pattern: "\\|\\s*curl\\s+"
      reason: "Pipe данных в curl (потенциальная exfiltration)"
      severity: "high"
      action: "escalate"

    # --- pip/gem/npm install в системные пути ---
    - pattern: "pip[23]?\\s+install\\s+.*--target=/(usr|lib|opt)"
      reason: "pip install в системный каталог"
      severity: "high"
      action: "escalate"
    - pattern: "pip[23]?\\s+install\\s+.*--system"
      reason: "pip install --system (в системные пакеты)"
      severity: "high"
      action: "escalate"

    # --- declare -x / env var manipulation ---
    - pattern: "declare\\s+-x\\s+(http_proxy|https_proxy|ftp_proxy|all_proxy|no_proxy)="
      reason: "Установка прокси через declare (перенаправление трафика)"
      severity: "high"
      action: "escalate"

    # --- Herestring / heredoc to shell ---
    - pattern: "(bash|sh|zsh)\\s+<<<\\s+"
      reason: "Herestring в shell (потенциальное скрытое исполнение)"
      severity: "high"
      action: "escalate"
    - pattern: "(python[23]?|ruby|perl|bash|sh|zsh)\\s+<<\\s*['\"]?\\w+"
      reason: "Heredoc в интерпретатор (скрытое исполнение кода)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bat\\s+now"
      reason: "Отложенное исполнение через at now"
      severity: "high"
      action: "escalate"
    - pattern: "crontab\\s+-$"
      reason: "Установка crontab из stdin"
      severity: "high"
      action: "escalate"
    - pattern: "\\|\\s*crontab\\b"
      reason: "Pipe в crontab (установка задач)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bwatch\\s+.*rm\\b"
      reason: "watch с командой удаления"
      severity: "high"
      action: "escalate"
    - pattern: "journalctl\\s+--vacuum"
      reason: "Очистка журналов systemd (anti-forensics)"
      severity: "high"
      action: "escalate"

    # --- Archive extract to root ---
    - pattern: "unzip\\s+.*-d\\s+/[^t/]"
      reason: "Распаковка unzip в системный каталог"
      severity: "critical"
      action: "escalate"
    - pattern: "unzip\\s+.*-d\\s+/$"
      reason: "Распаковка unzip в корень"
      severity: "critical"
      action: "escalate"
    - pattern: "7z\\s+.*-o/[^t]"
      reason: "Распаковка 7z в системный каталог"
      severity: "critical"
      action: "escalate"
    - pattern: "7z\\s+.*-o/$"
      reason: "Распаковка 7z в корень"
      severity: "critical"
      action: "escalate"
    - pattern: "tar\\s+.*--directory=/"
      reason: "Распаковка tar --directory в корень"
      severity: "critical"
      action: "escalate"

    # --- Linux low-level: loop devices, swap, capabilities, chroot, pivot_root ---
    - pattern: "\\blosetup\\s+"
      reason: "Создание loop device"
      severity: "high"
      action: "escalate"
    - pattern: "\\bswapoff\\s+"
      reason: "Отключение swap (DoS предвестник)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bswapon\\s+"
      reason: "Подключение swap (потенциальная подмена)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bsetcap\\s+"
      reason: "Установка capabilities (аналог SUID)"
      severity: "critical"
      action: "escalate"
    - pattern: "\\bgetcap\\s+-r"
      reason: "Рекурсивный поиск capabilities (разведка)"
      severity: "medium"
      action: "escalate"
    - pattern: "\\bchroot\\s+"
      reason: "chroot (потенциальный escape/sandbox breakout)"
      severity: "high"
      action: "escalate"
    - pattern: "\\bpivot_root\\s+"
      reason: "pivot_root (namespace/sandbox escape)"
      severity: "critical"
      action: "escalate"
    - pattern: "\\bulimit\\s+-[nufml]\\s+\\d"
      reason: "Снижение ulimit (потенциальный DoS)"
      severity: "medium"
      action: "escalate"

    # --- /dev/sd* raw access ---
    - pattern: "cat\\s+.*</\\s*/dev/sd"
      reason: "Чтение raw block device (клонирование диска)"
      severity: "high"
      action: "escalate"
    - pattern: "/dev/sd[a-z]"
      reason: "Обращение к raw block device"
      severity: "high"
      action: "escalate"

  blacklist:
    - pattern: "(?:^|[/\\s])rm\\s+-rf[a-z]*\\s+/(?!tmp/|tmp$|home/|var/tmp/)"
      reason: "Рекурсивное удаление от корня или системного каталога"
      severity: "critical"
    - pattern: "(?:^|[/\\s])rm\\s+-rf[a-z]*\\s+\\*"
      reason: "Массовое удаление"
      severity: "critical"
    - pattern: "(?:^|[/\\s])rm\\s+-rf[a-z]*\\s+\\."
      reason: "Рекурсивное удаление текущей директории"
      severity: "critical"
    - pattern: "(?:^|[/\\s])rm\\s+-rf[a-z]*\\s+~"
      reason: "Рекурсивное удаление домашней директории"
      severity: "critical"
    - pattern: "(?:^|[/\\s])rm\\s+-rf[a-z]*\\s+\\$"
      reason: "Рекурсивное удаление через переменную ($HOME и т.п.)"
      severity: "critical"
    - pattern: "^:\\(\\)\\{\\s*:\\|:&\\s*\\};:"
      reason: "Fork bomb"
      severity: "critical"
    - pattern: "dd\\s+if=.*/dev/"
      reason: "Прямая запись на блочное устройство"
      severity: "critical"
    - pattern: "mkfs\\."
      reason: "Форматирование файловой системы"
      severity: "critical"
    - pattern: "chmod\\s+-R\\s+777"
      reason: "Полный доступ рекурсивно"
      severity: "high"
    - pattern: "chmod\\s+777"
      reason: "Полный доступ"
      severity: "high"
    - pattern: ">\\s*/dev/sd[a-z]"
      reason: "Затирание блочного устройства"
      severity: "critical"
    - pattern: "wget.*\\|\\s*(bash|sh)"
      reason: "Загрузка и исполнение удалённого скрипта"
      severity: "critical"
    - pattern: "curl.*\\|\\s*(bash|sh)"
      reason: "Загрузка и исполнение удалённого скрипта"
      severity: "critical"
    - pattern: "(bash|sh|zsh)\\s+<\\("
      reason: "Process substitution — исполнение динамического контента"
      severity: "critical"
    - pattern: "(?:^|[;|&]\\s*)shutdown\\b"
      reason: "Выключение сервера"
      severity: "high"
    - pattern: "(?:^|[;|&]\\s*)reboot\\b"
      reason: "Перезагрузка сервера"
      severity: "high"
    - pattern: "init\\s+[06]"
      reason: "Выключение/перезагрузка через init"
      severity: "high"
    - pattern: "systemctl\\s+(stop|disable)\\s+(sshd|firewalld|iptables|ufw)"
      reason: "Остановка критичного сервиса"
      severity: "critical"
    - pattern: "iptables\\s+-F"
      reason: "Сброс правил файрвола"
      severity: "critical"
    - pattern: "ufw\\s+disable"
      reason: "Отключение файрвола"
      severity: "critical"
    - pattern: "passwd\\s+root"
      reason: "Смена пароля root"
      severity: "high"
    - pattern: "(?:^|[;|&]\\s*)visudo\\b"
      reason: "Редактирование sudoers"
      severity: "high"
    - pattern: "nc\\s+-[elp]"
      reason: "Netcat listener (потенциальный бэкдор)"
      severity: "critical"
    - pattern: "/dev/tcp/"
      reason: "Reverse shell через /dev/tcp"
      severity: "critical"
    - pattern: "history\\s+-c"
      reason: "Очистка истории (сокрытие следов)"
      severity: "high"
    - pattern: "\\bshred\\b"
      reason: "Безвозвратное удаление данных"
      severity: "high"
    - pattern: "base64.*\\|.*(bash|sh|exec)"
      reason: "Base64-обфускация с исполнением (возможный бэкдор)"
      severity: "critical"
    - pattern: "\\|\\s*base64\\s+-d\\s*\\|"
      reason: "Декодирование base64 в пайплайне (обфускация)"
      severity: "high"
    - pattern: "eval\\s*\\$\\("
      reason: "Eval с подстановкой команды (обфускация)"
      severity: "critical"
    - pattern: "python[23]?\\s+-c\\s+['\"].*import"
      reason: "Python one-liner с импортом (потенциальный бэкдор)"
      severity: "high"
    - pattern: "perl\\s+-e\\s+['\"]"
      reason: "Perl one-liner (потенциальный бэкдор)"
      severity: "high"
    - pattern: "ruby\\s+-e\\s+['\"]"
      reason: "Ruby one-liner (потенциальный бэкдор)"
      severity: "high"
    - pattern: "php\\s+-r\\s+['\"]"
      reason: "PHP one-liner (потенциальный бэкдор)"
      severity: "high"
    - pattern: "lua\\s+-e\\s+['\"]"
      reason: "Lua one-liner (потенциальный бэкдор)"
      severity: "high"
    - pattern: "awk\\s+.*system\\s*\\("
      reason: "awk system() — выполнение произвольных команд"
      severity: "high"
    - pattern: "echo\\s+[A-Za-z0-9+/=]{20,}\\s*\\|"
      reason: "Echo закодированных данных в пайплайн (обфускация)"
      severity: "high"
    - pattern: "echo\\s+.*\\|\\s*(bash|sh|zsh|dash)\\b"
      reason: "Echo в pipe к shell (потенциальное скрытое исполнение)"
      severity: "critical"
    - pattern: "\\$\\{!?[A-Z_]+\\}.*\\|.*(bash|sh)"
      reason: "Переменная окружения в pipe к shell (обфускация)"
      severity: "medium"
    - pattern: "\\$\\{?IFS\\}?"
      reason: "Использование $IFS (разделитель полей — техника обфускации команд)"
      severity: "high"
    - pattern: "xargs\\s+.*rm"
      reason: "Массовое удаление через xargs"
      severity: "high"
    - pattern: "find\\s+.*-exec.*rm"
      reason: "Массовое удаление через find -exec"
      severity: "high"
    - pattern: "find\\s+.*-exec\\s+.*(sh|bash|zsh|dash)\\b"
      reason: "find -exec с запуском shell (GTFOBins shell escape)"
      severity: "critical"
    - pattern: "find\\s+/\\s.*-delete"
      reason: "Массовое удаление через find -delete от корня"
      severity: "high"
    - pattern: "find\\s+/(etc|usr|var|bin|sbin|lib|boot|sys|proc|dev).*-delete"
      reason: "Массовое удаление через find -delete в системном каталоге"
      severity: "high"
    - pattern: "crontab\\s+-r"
      reason: "Удаление всех cron-задач"
      severity: "high"
    - pattern: "unset\\s+HISTFILE"
      reason: "Отключение записи истории (сокрытие следов)"
      severity: "high"
    - pattern: "export\\s+HISTSIZE=0"
      reason: "Обнуление размера истории (сокрытие следов)"
      severity: "high"
    - pattern: "nohup\\s+.*&"
      reason: "Фоновый процесс через nohup (потенциальный бэкдор)"
      severity: "medium"
    - pattern: "\\$[A-Za-z_{}]+\\s+-rf\\s+/"
      reason: "Переменная как команда с -rf / (обфускация rm)"
      severity: "critical"

rbac:
  roles:
    dev:
      description: "Разработчик"
      allowed_commands:
        - "ls"
        - "cat"
        - "grep"
        - "tail"
        - "head"
        - "less"
        - "ps"
        - "top"
        - "df"
        - "du"
        - "git"
        - "docker logs"
        - "docker ps"
        - "kubectl get"
        - "kubectl describe"
        - "kubectl logs"
      denied_commands:
        - "rm"
        - "systemctl"
        - "service"
        - "useradd"
        - "userdel"
        - "chmod"
        - "chown"
        - "iptables"
    ops:
      description: "Системный администратор"
      allowed_commands: ["*"]
      denied_commands:
        - "rm -rf /"
        - "dd if=/dev/zero"
    dba:
      description: "Администратор баз данных"
      allowed_commands:
        - "psql"
        - "mysql"
        - "mongosh"
        - "redis-cli"
        - "pg_dump"
        - "pg_restore"
        - "mysqldump"
        - "ls"
        - "cat"
        - "tail"
        - "grep"
      denied_commands:
        - "rm"
        - "systemctl"
        - "useradd"
        - "iptables"
    neteng:
      description: "Сетевой инженер"
      allowed_commands:
        - "ip"
        - "ifconfig"
        - "ping"
        - "traceroute"
        - "netstat"
        - "ss"
        - "tcpdump"
        - "nmap"
        - "dig"
        - "nslookup"
        - "iptables -L"
        - "ufw status"
        - "ls"
        - "cat"
      denied_commands:
        - "rm"
        - "useradd"
        - "passwd"

  users:
    admin:
      role: "ops"
    dev_user:
      role: "dev"
    dba_user:
      role: "dba"

  time_policy:
    high_risk_hours:
      start: "22:00"
      end: "06:00"
      timezone: "Europe/Moscow"
      action: "escalate"        # escalate | deny | warn

alerts:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  webhook:
    enabled: false
    url: ""
    headers:
      Content-Type: "application/json"

audit:
  db_path: "audit.db"
  json_log: "audit.jsonl"
  retention_days: 90

dashboard:
  host: "127.0.0.1"
  port: 8080

bastion:
  listen_port: 2222
  target_host: ""
  target_port: 22
  target_user: ""
  target_password: ""

# ── Профили целевых устройств ──────────────────────────────────
# Тип "linux" — поведение по умолчанию (текущая система).
# Тип "network" — специализированный анализ команд сетевого оборудования.
# Автоопределение: по SSH-баннеру (detect_banner) и приглашению (detect_prompt).
# Если ничего не совпало — используется "linux" по умолчанию.

target_profiles:
  linux:
    type: "linux"

  cisco_ios:
    type: "network"
    vendor: "cisco_ios"
    detect_banner:
      - "Cisco IOS"
      - "Cisco Internetwork Operating System"
      - "IOS-XE"
      - "Cisco Adaptive Security"
    detect_prompt:
      - "^\\S+[>#]\\s*$"
      - "^\\S+\\(config"
    context_command: "show running-config"
    context_max_bytes: 16384
    network_rules:
      safe_commands:
        - "show"
        - "ping"
        - "traceroute"
        - "dir"
        - "more"
        - "terminal length"
        - "terminal width"
      dangerous_patterns:
        - pattern: "\\bwrite\\s+erase\\b"
          reason: "Полное удаление конфигурации устройства"
          severity: "critical"
        - pattern: "\\berase\\s+(startup-config|nvram)"
          reason: "Стирание startup-config / NVRAM"
          severity: "critical"
        - pattern: "\\breload\\b"
          reason: "Перезагрузка устройства"
          severity: "critical"
        - pattern: "\\bno\\s+router\\s+(ospf|eigrp|bgp|rip|isis)\\b"
          reason: "Удаление процесса маршрутизации целиком"
          severity: "critical"
        - pattern: "\\bno\\s+ip\\s+route\\s+0\\.0\\.0\\.0"
          reason: "Удаление маршрута по умолчанию"
          severity: "critical"
        - pattern: "\\bshutdown\\s*$"
          reason: "Выключение интерфейса (shutdown)"
          severity: "high"
        - pattern: "\\bno\\s+interface\\b"
          reason: "Удаление интерфейса"
          severity: "critical"
        - pattern: "\\bformat\\b"
          reason: "Форматирование файловой системы устройства"
          severity: "critical"
        - pattern: "\\bno\\s+ip\\s+address\\b"
          reason: "Удаление IP-адреса с интерфейса"
          severity: "high"
        - pattern: "\\bno\\s+switchport\\b"
          reason: "Изменение режима порта (L2→L3 или наоборот)"
          severity: "high"
        - pattern: "\\bclear\\s+ip\\s+bgp\\s+\\*"
          reason: "Сброс всех BGP-сессий"
          severity: "critical"
        - pattern: "\\bclear\\s+ip\\s+ospf\\s+process"
          reason: "Перезапуск процесса OSPF"
          severity: "high"
        - pattern: "\\bno\\s+spanning-tree\\b"
          reason: "Отключение STP (риск петель)"
          severity: "critical"
        - pattern: "\\bno\\s+vlan\\s+\\d+"
          reason: "Удаление VLAN"
          severity: "high"
        - pattern: "\\bsnmp-server\\s+community\\b.*\\bRW\\b"
          reason: "Установка SNMP community с правами записи"
          severity: "critical"
        - pattern: "\\bno\\s+enable\\s+secret\\b"
          reason: "Удаление пароля enable secret"
          severity: "critical"
        - pattern: "\\bno\\s+service\\s+password-encryption\\b"
          reason: "Отключение шифрования паролей"
          severity: "high"
        - pattern: "\\bno\\s+ip\\s+access-list\\b"
          reason: "Удаление ACL"
          severity: "high"
        - pattern: "\\bno\\s+access-list\\s+\\d+"
          reason: "Удаление ACL по номеру"
          severity: "high"
        - pattern: "\\bno\\s+crypto\\b"
          reason: "Удаление криптографической конфигурации (VPN/IPsec)"
          severity: "critical"
        - pattern: "\\bno\\s+ip\\s+ssh\\b"
          reason: "Отключение SSH на устройстве"
          severity: "critical"
        - pattern: "\\bno\\s+aaa\\b"
          reason: "Отключение AAA (аутентификации/авторизации)"
          severity: "critical"
        - pattern: "\\bline\\s+(vty|con).*\\bno\\s+login\\b"
          reason: "Отключение аутентификации на линиях доступа"
          severity: "critical"
      escalation_patterns:
        - pattern: "\\binterface\\b"
          reason: "Вход в конфигурацию интерфейса"
          severity: "medium"
          action: "escalate"
        - pattern: "\\brouter\\s+(ospf|bgp|eigrp|rip|isis)\\b"
          reason: "Конфигурация процесса маршрутизации"
          severity: "high"
          action: "escalate"
        - pattern: "\\bip\\s+route\\b"
          reason: "Изменение статических маршрутов"
          severity: "high"
          action: "escalate"
        - pattern: "\\baccess-list\\b"
          reason: "Изменение ACL (контроль доступа)"
          severity: "high"
          action: "escalate"
        - pattern: "\\bip\\s+nat\\b"
          reason: "Изменение NAT-конфигурации"
          severity: "high"
          action: "escalate"
        - pattern: "\\bvlan\\s+\\d+"
          reason: "Конфигурация VLAN"
          severity: "medium"
          action: "escalate"
        - pattern: "\\bspanning-tree\\b"
          reason: "Изменение STP"
          severity: "high"
          action: "escalate"
        - pattern: "\\bbanner\\b"
          reason: "Изменение баннера устройства"
          severity: "medium"
          action: "escalate"
        - pattern: "\\bsnmp-server\\b"
          reason: "Изменение SNMP-конфигурации"
          severity: "high"
          action: "escalate"
        - pattern: "\\blogging\\b"
          reason: "Изменение конфигурации логирования"
          severity: "medium"
          action: "escalate"
        - pattern: "\\bntp\\b"
          reason: "Изменение конфигурации NTP"
          severity: "medium"
          action: "escalate"
        - pattern: "\\bcopy\\s+running-config\\s+startup-config\\b"
          reason: "Сохранение конфигурации"
          severity: "medium"
          action: "escalate"
        - pattern: "\\bwrite\\s+memory\\b"
          reason: "Сохранение конфигурации в NVRAM"
          severity: "medium"
          action: "escalate"

  junos:
    type: "network"
    vendor: "junos"
    detect_banner:
      - "Juniper Networks"
      - "JUNOS"
    detect_prompt:
      - "^\\S+@\\S+[>%#]\\s*$"
      - "^\\[edit"
    context_command: "show configuration | display set | no-more"
    context_max_bytes: 16384
    network_rules:
      safe_commands:
        - "show"
        - "ping"
        - "traceroute"
        - "monitor"
        - "help"
        - "set cli"
      dangerous_patterns:
        - pattern: "\\brequest\\s+system\\s+(reboot|halt|power-off|zeroize)"
          reason: "Перезагрузка/остановка/обнуление устройства"
          severity: "critical"
        - pattern: "\\bdelete\\s+(protocols|interfaces|routing-options|security|firewall)"
          reason: "Удаление критической секции конфигурации"
          severity: "critical"
        - pattern: "\\bdeactivate\\s+(protocols|interfaces|routing-options|security)"
          reason: "Деактивация критической секции"
          severity: "critical"
        - pattern: "\\brollback\\s+\\d+"
          reason: "Откат конфигурации на предыдущую версию"
          severity: "high"
        - pattern: "\\bload\\s+override"
          reason: "Полная перезапись конфигурации"
          severity: "critical"
        - pattern: "\\bdelete\\s+routing-instances\\b"
          reason: "Удаление VRF/routing-instance"
          severity: "critical"
        - pattern: "\\bdelete\\s+vlans\\b"
          reason: "Удаление VLAN"
          severity: "high"
        - pattern: "\\bwildcard\\s+delete\\b"
          reason: "Массовое удаление через wildcard"
          severity: "critical"
      escalation_patterns:
        - pattern: "\\bset\\s+(interfaces|protocols|routing-options|security|firewall)"
          reason: "Изменение конфигурации сети/безопасности"
          severity: "high"
          action: "escalate"
        - pattern: "\\bcommit\\b"
          reason: "Применение конфигурации (commit)"
          severity: "high"
          action: "escalate"
        - pattern: "\\bload\\s+(merge|replace|set)"
          reason: "Загрузка конфигурации"
          severity: "high"
          action: "escalate"
        - pattern: "\\brollback\\s*$"
          reason: "Откат последнего изменения"
          severity: "medium"
          action: "escalate"

  mikrotik:
    type: "network"
    vendor: "mikrotik"
    detect_banner:
      - "MikroTik"
      - "RouterOS"
    detect_prompt:
